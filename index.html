<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition Calculator</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 380px;
            text-align: center;
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
        }

        input {
            width: 90%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 8px rgba(102,126,234,0.5);
        }

        button {
            width: 95%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            font-size: 18px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #5a67d8;
            transform: scale(1.05);
        }

        #result {
            margin-top: 20px;
            font-size: 22px;
            color: #333;
            background: #f3f4f6;
            padding: 10px;
            border-radius: 8px;
        }

        .footer {
            margin-top: 15px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>➕ Addition Calculator</h2>

    <input type="number" id="num1" placeholder="Enter Number 1">
    <input type="number" id="num2" placeholder="Enter Number 2">

    <button id="addBtn" onclick="addNumbers()">Add Numbers</button>

    <h3 id="result">Result: </h3>

    <div class="footer">Selenium Testing Ready App</div>
</div>

<script>
function addNumbers() {
    let n1 = document.getElementById("num1").value;
    let n2 = document.getElementById("num2").value;

    if (n1 === "" || n2 === "") {
        document.getElementById("result").innerText = "Result: Please enter both numbers!";
        return;
    }

    let sum = parseInt(n1) + parseInt(n2);

    document.getElementById("result").innerText = "Result: " + sum;
}
</script>

</body>
</html>
